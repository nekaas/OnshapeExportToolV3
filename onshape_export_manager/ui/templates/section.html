{% extends "base.html" %}
{% block content %}
<div x-data="sectionPage('{{ page }}')" x-init="load()" class="page">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-search" x-show="hasTable">
      <span x-html="icons.search"></span>
      <input type="text" placeholder="Filter…" x-model="filter" />
    </div>
    <div class="toolbar-actions">
      <template x-for="tab in tabs" :key="tab">
        <button class="chip" :class="{ active: activeTab === tab }" @click="setTab(tab)" x-text="tab"></button>
      </template>
      <button class="btn btn-ghost" @click="load()" :class="{ spinning: loading }">
        <span x-html="icons.refresh"></span><span>Refresh</span>
      </button>
    </div>
  </div>

  <!-- Logs view -->
  <template x-if="page === 'logs'">
    <div class="card glass logs-card">
      <div class="log-tabs">
        <template x-for="area in logAreas" :key="area">
          <button class="chip" :class="{ active: activeLog === area }" @click="selectLog(area)" x-text="area"></button>
        </template>
      </div>
      <pre class="log-view" x-ref="logView"><template x-for="(line, i) in logLines" :key="i"><div class="log-line" :class="logClass(line)" x-text="line"></div></template></pre>
      <div class="empty" x-show="!logLines.length && !loading">No log entries.</div>
    </div>
  </template>

  <!-- Manual export view (also used by new /export page) -->
  <template x-if="page === 'manual-export' || page === 'export'">
    <div class="manual-workflow" x-init="$nextTick(() => initManualPlanner())">

      <!-- Tree-based batch group selection -->
      <section class="manual-command glass" x-data="treeSelector" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px">
          <h3 style="font-size:1rem;font-weight:700;margin:0">Select Groups</h3>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge badge-ok" x-show="!loading && selectedCount > 0"
                  x-text="selectedCount + ' selected'"></span>
            <button class="btn btn-primary btn-sm" @click="queueExport()" :disabled="selectedCount === 0">
              <span x-html="icons.bolt"></span><span>Export Selected</span>
            </button>
          </div>
        </div>
        <div x-show="!loading" style="max-height:300px;overflow-y:auto">
          <template x-for="account in accounts" :key="account.name">
            <div style="border-bottom:1px solid var(--border-light);padding:6px 0">
              <div @click="toggle(account.name)"
                   style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0">
                <span style="font-size:10px;transition:transform .2s"
                      :style="expanded[account.name] ? 'transform:rotate(90deg)' : ''">▶</span>
                <input type="checkbox" :checked="selectAllAccounts[account.name]"
                       @click.stop @change="toggleAccount(account.name)" style="margin:0" />
                <span style="font-weight:700;font-size:0.85rem" x-text="account.name"></span>
                <span style="font-size:0.68rem;color:var(--text-dim)" x-text="account.group_count + ' groups'"></span>
              </div>
              <div x-show="expanded[account.name]" style="padding-left:24px">
                <template x-for="group in account.groups" :key="group.friendly_name">
                  <div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:0.82rem">
                    <input type="checkbox" :checked="selected[group.friendly_name]"
                           @change="toggleGroup(group.friendly_name)" style="margin:0" />
                    <span x-text="group.friendly_name"></span>
                    <span x-show="!group.enabled" style="color:var(--red);font-size:0.65rem">disabled</span>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </section>

      <section class="manual-command glass">
        <div class="manual-command-head">
          <div>
            <h2 class="manual-title">Manual Export</h2>
            <div class="manual-subline">
              <span class="badge" :class="worker.running ? 'badge-ok' : 'badge-muted'"
                    x-text="worker.running ? 'Worker running' : 'Worker idle'"></span>
              <template x-if="preview && preview.window">
                <span x-text="preview.window.duration_label"></span>
              </template>
            </div>
          </div>
          <div class="manual-command-actions">
            <button class="btn btn-ghost" @click="previewExport()" :class="{ spinning: previewBusy }">
              <span x-html="icons.check"></span><span>Preview</span>
            </button>
            <button class="btn btn-primary" @click="runExport()" :class="{ spinning: exportBusy }"
                    :disabled="!canRunExport">
              <span x-html="icons.bolt"></span><span>Queue Export</span>
            </button>
          </div>
        </div>

        <div class="manual-picker-grid">
          <label class="field">
            <span>Group</span>
            <select x-model="manual.label" @change="onManualSelectionChanged()">
              <template x-for="l in rows" :key="l.friendly_name">
                <option :value="l.friendly_name" x-text="l.friendly_name"></option>
              </template>
            </select>
          </label>
          <label class="field">
            <span>Export Profile</span>
            <select x-model="manual.profile" @change="onManualSelectionChanged()">
              <option value="">Group default</option>
              <template x-for="p in profiles" :key="p.name">
                <option :value="p.name" x-text="p.name"></option>
              </template>
            </select>
          </label>
          <label class="field">
            <span>Destination</span>
            <input x-model="manual.destination" @input.debounce.300ms="previewExport()" placeholder="Group export location" />
          </label>
        </div>
      </section>

      <section class="manual-grid">
        <div class="manual-panel glass">
          <div class="manual-panel-head">
            <h3>Date Window</h3>
            <div class="segmented">
              <button :class="{ active: manual.mode === 'range' }" @click="setManualMode('range')">Range</button>
              <button :class="{ active: manual.mode === 'single' }" @click="setManualMode('single')">Single Day</button>
            </div>
          </div>

          <div class="preset-grid">
            <template x-for="preset in datePresets" :key="preset.key">
              <button class="preset-btn" :class="{ active: manual.preset === preset.key }"
                      @click="applyDatePreset(preset.key)" x-text="preset.label"></button>
            </template>
          </div>

          <div class="manual-date-grid" x-show="manual.mode === 'range'">
            <label class="field">
              <span>Start</span>
              <input x-ref="manualStartPicker" type="text" readonly placeholder="Choose start" />
            </label>
            <label class="field">
              <span>End</span>
              <input x-ref="manualEndPicker" type="text" readonly placeholder="Choose end" />
            </label>
          </div>

          <div class="manual-date-grid" x-show="manual.mode === 'single'">
            <label class="field">
              <span>Date</span>
              <input x-ref="manualSinglePicker" type="text" readonly placeholder="Choose date" />
            </label>
          </div>

          <div class="manual-template-row">
            <label class="field template-select">
              <span>Saved Templates</span>
              <select x-model="manual.templateId" @change="applySavedTemplate(manual.templateId)">
                <option value="">Choose template</option>
                <template x-for="tpl in manualTemplates" :key="tpl.id">
                  <option :value="tpl.id" x-text="tpl.name"></option>
                </template>
              </select>
            </label>
            <button class="btn btn-ghost" @click="saveManualTemplate()">
              <span x-html="icons.save"></span><span>Save</span>
            </button>
            <button class="btn btn-ghost" @click="toggleFavoriteTemplate(manual.templateId)"
                    :disabled="!manual.templateId">
              <span x-html="icons.star"></span><span>Favorite</span>
            </button>
          </div>

          <div class="template-strip" x-show="favoriteTemplates.length">
            <span class="strip-label">Favorites</span>
            <template x-for="tpl in favoriteTemplates" :key="tpl.id">
              <button class="template-chip favorite" @click="applyTemplate(tpl)">
                <span x-html="icons.star"></span><span x-text="tpl.name"></span>
              </button>
            </template>
          </div>

          <div class="template-strip" x-show="recentTemplates.length">
            <span class="strip-label">Recent</span>
            <template x-for="tpl in recentTemplates" :key="tpl.id">
              <button class="template-chip" @click="applyTemplate(tpl)" x-text="tpl.name"></button>
            </template>
          </div>
        </div>

        <div class="manual-panel glass">
          <div class="manual-panel-head">
            <h3>Export Preview</h3>
            <span class="badge" :class="preview && preview.valid ? 'badge-ok' : 'badge-muted'"
                  x-text="preview && preview.valid ? 'Ready' : 'Needs preview'"></span>
          </div>

          <div class="estimate-grid">
            <template x-for="card in estimateCards" :key="card.key">
              <div class="estimate-card">
                <span class="estimate-icon" x-html="card.icon"></span>
                <strong x-text="card.value"></strong>
                <span x-text="card.label"></span>
              </div>
            </template>
          </div>

          <div class="summary-list" x-if="preview && preview.valid">
            <div><span>Label</span><strong x-text="preview?.label?.name || '—'"></strong></div>
            <div><span>Profile</span><strong x-text="preview?.profile?.name || '—'"></strong></div>
            <div><span>Window</span><strong x-text="(preview?.window?.start_display || '—') + ' → ' + (preview?.window?.end_display || '—')"></strong></div>
            <div><span>Formats</span><strong x-text="(preview?.formats || []).map((f) => f.display_name).join(', ') || '—'"></strong></div>
          </div>

          <div class="validation-list">
            <template x-for="check in previewChecks" :key="check.key">
              <div class="validation-row" :class="'check-' + check.status">
                <span class="validation-dot"></span>
                <div>
                  <strong x-text="check.label"></strong>
                  <span x-text="check.detail"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>

      <section class="manual-timeline glass" x-show="previewTimeline.length">
        <template x-for="step in previewTimeline" :key="step.label">
          <div class="manual-step" :class="'step-' + step.status">
            <div class="manual-step-mark" x-html="step.status === 'done' ? icons.check : icons.clock"></div>
            <div>
              <strong x-text="step.label"></strong>
              <span x-text="step.detail"></span>
            </div>
          </div>
        </template>
      </section>
    </div>

    <!-- Queue status (shown on new /export page below the export form) -->
    <template x-if="page === 'export'">
      <div class="card glass" style="margin-top:18px">
        <div class="card-head">
          <h2 class="card-title">Active &amp; Queued</h2>
          <span class="badge" :class="worker.running ? 'badge-ok' : 'badge-muted'"
                x-text="worker.running ? 'Worker running' : 'Worker idle'"></span>
        </div>
        <div class="table-wrap" @click="onQueueAction($event)">
          <table class="data-table">
            <thead><tr>
              <th>Label</th><th>Profile</th><th>Status</th><th>Retries</th><th>Next Run</th><th>Last Error</th><th></th>
            </tr></thead>
            <tbody>
              <template x-for="item in (queueItems || [])" :key="item.id">
                <tr>
                  <td><strong x-text="item.label_name"></strong></td>
                  <td x-text="item.profile_name"></td>
                  <td><span class="badge" :class="{
                    'badge-ok': item.status === 'completed',
                    'badge-warn': item.status === 'running',
                    'badge-muted': item.status === 'pending' || item.status === 'cancelled',
                    'badge-fail': item.status === 'failed',
                  }" x-text="item.status"></span></td>
                  <td x-text="item.retry_count"></td>
                  <td><span :title="item.next_run_at" x-text="formatTime(item.next_run_at)"></span></td>
                  <td x-text="item.last_error || '—'"></td>
                  <td>
                    <template x-if="item.status === 'pending' || item.status === 'running'">
                      <button class="btn btn-ghost btn-sm" :data-qaction="'cancel'" :data-qid="item.id">Cancel</button>
                    </template>
                    <template x-if="item.status === 'failed' || item.status === 'cancelled'">
                      <button class="btn btn-ghost btn-sm" :data-qaction="'retry'" :data-qid="item.id">Retry</button>
                    </template>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div class="empty" x-show="(!queueItems || !queueItems.length) && !loading">
          The export queue is empty. Run an export above to see it here.
        </div>
      </div>
    </template>
  </template>

  <!-- ── Groups (tree: Accounts → Groups hierarchy) ── -->
  <template x-if="page === 'labels'" x-data="treeSelector">
    <div class="page" style="gap:16px">

      <!-- Header -->
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <h2 style="font-size:1.25rem;font-weight:700;margin:0">Groups</h2>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="badge badge-muted" x-show="loading">Loading…</span>
          <span class="badge badge-ok" x-show="!loading && selectedCount > 0"
                x-text="selectedCount + ' selected'"></span>
          <button class="btn btn-primary btn-sm" @click="queueExport()" :disabled="selectedCount === 0">
            <span x-html="icons.bolt"></span><span>Export Selected</span>
          </button>
        </div>
      </div>

      <!-- Create Group Form -->
      <div class="card glass" x-show="showCreateForm" x-transition style="padding:16px 20px">
        <h3 style="font-size:1rem;font-weight:700;margin:0 0 12px">
          Create Group <span x-show="createTargetAccount" x-text="'in ' + createTargetAccount"></span>
        </h3>
        <div class="form-grid" style="grid-template-columns:1fr 1fr;gap:12px">
          <label class="field"><span>Group Name</span><input x-model="groupForm.name" placeholder="e.g. Robotics Team" /></label>
          <label class="field"><span>Onshape Label ID</span><input x-model="groupForm.onshape_id" placeholder="24-character ID" /></label>
          <label class="field"><span>Export Profile</span>
            <select x-model="groupForm.profile">
              <option value="STL">STL</option>
              <option value="STEP">STEP</option>
            </select>
          </label>
          <label class="field"><span>Schedule (optional)</span>
            <select x-model="groupForm.schedule">
              <option value="">None</option>
              <option value="15min">Every 15 min</option>
              <option value="30min">Every 30 min</option>
              <option value="hourly">Hourly</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
            </select>
          </label>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-primary btn-sm" @click="createGroup()">Create</button>
          <button class="btn btn-ghost btn-sm" @click="cancelCreate()">Cancel</button>
        </div>
      </div>

      <!-- Delete Confirmation -->
      <div class="card glass" x-show="deleteConfirm" x-transition
           style="padding:16px 20px;border:1px solid var(--red);background:rgba(239,68,68,0.08)">
        <p style="margin:0 0 12px;font-weight:600">
          Delete group "<span x-text="deleteConfirm"></span>"? This cannot be undone.
        </p>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" style="background:var(--red);color:#fff" @click="deleteGroup(deleteConfirm)">Delete</button>
          <button class="btn btn-ghost btn-sm" @click="cancelDelete()">Cancel</button>
        </div>
      </div>

      <!-- Tree -->
      <div x-show="!loading">
        <template x-for="account in accounts" :key="account.name">
          <div class="tree-account card glass" style="padding:0;overflow:hidden">
            <div class="tree-account-header"
                 @click="toggle(account.name)"
                 style="display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-light)">
              <span class="tree-caret" :class="{ open: expanded[account.name] }"
                    style="display:inline-block;transition:transform .2s;font-size:10px"
                    :style="expanded[account.name] ? 'transform:rotate(90deg)' : ''">▶</span>
              <input type="checkbox"
                     :checked="selectAllAccounts[account.name]"
                     @click.stop
                     @change="toggleAccount(account.name)"
                     style="margin:0" />
              <span class="tree-account-name" x-text="account.name"
                    style="font-weight:700;font-size:0.95rem"></span>
              <span class="badge" :class="'badge-' + account.health"
                    x-text="account.health"
                    style="font-size:0.68rem"></span>
              <span x-show="account.description" x-text="account.description"
                    style="font-size:0.75rem;color:var(--text-dim)"></span>
              <span class="tree-count" x-text="account.group_count + ' groups'"
                    style="margin-left:auto;font-size:0.75rem;color:var(--text-dim)"></span>
            </div>

            <!-- Groups within this account -->
            <div class="tree-groups" x-show="expanded[account.name]"
                 style="padding:4px 0">
              <template x-for="group in account.groups" :key="group.friendly_name">
                <div class="tree-group"
                     style="display:flex;align-items:center;gap:10px;padding:8px 16px 8px 36px;transition:background .15s"
                     @mouseenter="$el.style.background='var(--hover-bg)'"
                     @mouseleave="$el.style.background=''">
                  <input type="checkbox"
                         :checked="selected[group.friendly_name]"
                         @change="toggleGroup(group.friendly_name)"
                         style="margin:0" />
                  <span x-text="group.friendly_name"
                        style="font-weight:600;font-size:0.88rem"></span>
                  <!-- Enable/disable toggle -->
                  <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:0.62rem"
                          @click.stop="toggleGroupEnabled(group.friendly_name, group.enabled)"
                          x-text="group.enabled !== false ? 'Disable' : 'Enable'"
                          :title="group.enabled !== false ? 'Disable this group' : 'Enable this group'"></button>
                  <span x-text="group.export_profile"
                        style="font-size:0.72rem;color:var(--text-dim)"></span>
                  <span x-show="group.schedule"
                        x-text="'⏱ ' + group.schedule"
                        style="font-size:0.68rem;color:var(--text-dim)"></span>
                  <!-- Move to another account -->
                  <select class="tree-move-select"
                          @click.stop
                          @change="moveGroup(group.friendly_name, $event.target.value)"
                          style="font-size:0.62rem;margin-left:auto;padding:2px 4px;border-radius:4px;background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border-light)">
                    <option value="">Move to…</option>
                    <template x-for="a in accounts" :key="a.name">
                      <option :value="a.name" x-text="a.name"
                              :selected="a.name === account.name"></option>
                    </template>
                  </select>
                  <!-- Delete -->
                  <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:0.62rem;color:var(--red)"
                          @click.stop="confirmDelete(group.friendly_name)"
                          title="Delete this group">✕</button>
                </div>
              </template>
              <!-- Empty & Create -->
              <div x-show="account.groups.length === 0"
                   style="padding:20px 16px 20px 36px;color:var(--text-dim);font-size:0.82rem">
                <span x-text="'No groups in ' + account.name"></span>
              </div>
              <div style="padding:8px 16px 8px 36px">
                <button class="btn btn-ghost btn-sm" style="font-size:0.72rem"
                        @click.stop="openCreateForm(account.name); expanded[account.name] = true">
                  + Create Group
                </button>
              </div>
            </div>
          </div>
        </template>

        <!-- Empty state -->
        <div x-show="accounts.length === 0" class="card glass" style="text-align:center;padding:36px 28px">
          <h2 style="font-size:1.2rem;font-weight:700;margin:0 0 6px">No Accounts Configured</h2>
          <p style="color:var(--text-muted);max-width:440px;margin:0 auto;font-size:0.88rem">
            Add an Onshape API account in settings to start organizing your exports into groups.
          </p>
        </div>
      </div>
    </div>
  </template>

  <!-- Generic data table -->
  <template x-if="hasTable">
    <div class="card glass">
      <div class="table-wrap" @click="page === 'queue' && onQueueAction($event)">
        <table class="data-table">
          <thead>
            <tr>
              <template x-for="col in columns" :key="col.key">
                <th @click="sortBy(col.key)" :class="{ sortable: true, sorted: sortKey === col.key }">
                  <span x-text="col.label"></span>
                  <span class="sort-caret" x-show="sortKey === col.key" x-text="sortDir === 'asc' ? '↑' : '↓'"></span>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="(row, i) in visibleRows" :key="i">
              <tr>
                <template x-for="col in columns" :key="col.key">
                  <td x-html="renderCell(col, row)"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div class="empty" x-show="!visibleRows.length && !loading" x-text="emptyText"></div>
      <div class="table-foot" x-show="visibleRows.length">
        <span x-text="visibleRows.length + ' of ' + rows.length"></span>
      </div>
    </div>
  </template>

  <!-- ── Settings (tabbed: General | Notifications | Backups | Remote | Logs | About) ── -->
  <template x-if="page === 'settings'">
    <div class="page" style="gap:18px">
      <!-- Settings tabs -->
      <div class="settings-tabs" style="display:flex;gap:6px;flex-wrap:wrap">
        <template x-for="tab in settingsTabs" :key="tab.slug">
          <button class="chip" :class="{ active: settingsActiveTab === tab.slug }"
                  @click="settingsActiveTab = tab.slug; switchSettingsTab(tab.slug)"
                  x-text="tab.label"></button>
        </template>
      </div>

      <!-- General -->
      <template x-if="settingsActiveTab === 'general'">
        <div class="settings-grid">
          <div class="card glass">
            <div class="card-head"><h2 class="card-title">Appearance</h2></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="chip" :class="{ active: !isDark }" @click="setTheme('light')">☀️ Light</button>
              <button class="chip" :class="{ active: isDark }" @click="setTheme('dark')">🌙 Dark</button>
            </div>
          </div>
          <div class="card glass">
            <div class="card-head"><h2 class="card-title">Worker</h2></div>
            <dl class="kv">
              <div class="kv-row"><dt>Status</dt><dd><span class="badge" :class="(system.worker && system.worker.running) ? 'badge-ok' : 'badge-muted'" x-text="(system.worker && system.worker.running) ? 'Running' : 'Stopped'"></span></dd></div>
              <div class="kv-row"><dt>Jobs processed</dt><dd x-text="(system.worker && system.worker.jobs_processed) || 0"></dd></div>
              <div class="kv-row"><dt>Last tick</dt><dd x-text="system.worker && system.worker.last_tick_at ? formatTime(system.worker.last_tick_at) : '—'"></dd></div>
            </dl>
            <div style="margin-top:14px;display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" @click="workerControl('start')" x-show="!(system.worker && system.worker.running)">Start Worker</button>
              <button class="btn btn-ghost btn-sm" @click="workerControl('stop')" x-show="system.worker && system.worker.running">Stop Worker</button>
            </div>
          </div>
          <div class="card glass">
            <div class="card-head"><h2 class="card-title">System Health</h2></div>
            <dl class="kv">
              <div class="kv-row"><dt>CPU</dt><dd x-text="(systemCards && systemCards.length && systemCards[0] && systemCards[0].value) || '—'"></dd></div>
              <div class="kv-row"><dt>RAM</dt><dd x-text="(systemCards && systemCards.length && systemCards[1] && systemCards[1].value) || '—'"></dd></div>
              <div class="kv-row"><dt>Disk</dt><dd x-text="(systemCards && systemCards.length && systemCards[3] && systemCards[3].value) || '—'"></dd></div>
              <div class="kv-row"><dt>Uptime</dt><dd x-text="(systemCards && systemCards.length && systemCards[4] && systemCards[4].value) || '—'"></dd></div>
            </dl>
          </div>
        </div>
      </template>

      <!-- Notifications -->
      <template x-if="settingsActiveTab === 'notifications'">
        <div class="page" style="gap:18px">
          <div class="card glass">
            <div class="card-head"><h2 class="card-title" x-text="notifForm.id ? 'Edit Channel' : 'New Channel'"></h2>
              <button class="btn btn-ghost btn-sm" @click="resetNotifForm()" x-show="notifForm.id">Cancel</button>
            </div>
            <div class="form-grid">
              <label class="field"><span>Name</span><input x-model="notifForm.name" placeholder="My Discord Channel" /></label>
              <label class="field"><span>Kind</span>
                <select x-model="notifForm.kind">
                  <template x-for="k in notifKinds" :key="k"><option :value="k" x-text="k"></option></template>
                </select>
              </label>
              <label class="field" style="grid-column:1/-1"><span>Target / Webhook URL</span><input x-model="notifForm.target" placeholder="https://..." /></label>
              <label class="field"><span>Min Severity</span>
                <select x-model="notifForm.min_severity">
                  <template x-for="s in notifSeverities" :key="s"><option :value="s" x-text="s"></option></template>
                </select>
              </label>
              <label class="field" style="align-items:flex-start;gap:10px">
                <span>Enabled</span>
                <input type="checkbox" x-model="notifForm.enabled" style="width:18px;height:18px;margin-top:2px" />
              </label>
            </div>
            <button class="btn btn-primary btn-sm" style="margin-top:14px" @click="saveNotification()">Save Channel</button>
          </div>
          <div class="card glass" x-show="notifChannels.length">
            <div class="card-head"><h2 class="card-title">Configured Channels</h2></div>
            <div class="table-wrap">
              <table class="data-table">
                <thead><tr><th>Name</th><th>Kind</th><th>Severity</th><th>Status</th><th></th></tr></thead>
                <tbody>
                  <template x-for="ch in notifChannels" :key="ch.id">
                    <tr>
                      <td><strong x-text="ch.name"></strong></td>
                      <td x-text="ch.kind"></td>
                      <td x-text="ch.min_severity"></td>
                      <td><span class="badge" :class="ch.enabled ? 'badge-ok' : 'badge-muted'" x-text="ch.enabled ? 'On' : 'Off'"></span></td>
                      <td>
                        <button class="btn btn-ghost btn-sm" @click="editNotification(ch)">Edit</button>
                        <button class="btn btn-ghost btn-sm" @click="testNotification(ch.id)">Test</button>
                        <button class="btn btn-ghost btn-sm" @click="deleteNotification(ch.id)">✕</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <div class="empty" x-show="!notifChannels.length">No notification channels configured.</div>
          </div>
        </div>
      </template>

      <!-- Backups -->
      <template x-if="settingsActiveTab === 'backups'">
        <div class="card glass">
          <div class="card-head"><h2 class="card-title">Backups</h2>
            <button class="btn btn-primary btn-sm" @click="createBackup()" :class="{ spinning: backupBusy }">
              <span x-html="icons.refresh"></span><span>Create Backup</span></button></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Name</th><th>Size</th><th>Files</th><th>Created</th></tr></thead>
              <tbody>
                <template x-for="b in backups" :key="b.name">
                  <tr><td><code x-text="b.name"></code></td><td x-text="b.size_human"></td>
                    <td x-text="b.entry_count"></td><td x-text="formatTime(b.created_at)"></td></tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="empty" x-show="!backups.length">No backups yet. Create one to snapshot config and database.</div>
        </div>
      </template>

      <!-- Remote Access -->
      <template x-if="settingsActiveTab === 'remote-access'">
        <div class="grid-2">
          <div class="card glass">
            <div class="card-head"><h2 class="card-title">Remote Access</h2>
              <span class="badge" :class="remote.recommended_url ? 'badge-ok' : 'badge-muted'"
                    x-text="remote.recommended_url ? 'Reachable' : 'Local only'"></span></div>
            <dl class="kv">
              <template x-for="row in remoteRows" :key="row.k">
                <div class="kv-row"><dt x-text="row.k"></dt>
                  <dd><span class="badge" :class="row.cls" x-show="row.badge" x-text="row.badge"></span>
                    <span x-text="row.v"></span></dd></div>
              </template>
            </dl>
          </div>
          <div class="card glass">
            <div class="card-head"><h2 class="card-title">Access URLs</h2></div>
            <div class="url-list">
              <template x-for="url in remote.local_urls || []" :key="url">
                <a class="url-pill" :href="url" target="_blank" x-text="url"></a>
              </template>
              <template x-for="url in (remote.tailscale && remote.tailscale.urls) || []" :key="url">
                <a class="url-pill ts" :href="url" target="_blank" x-text="'Tailscale · ' + url"></a>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Logs -->
      <template x-if="settingsActiveTab === 'logs'">
        <div class="card glass logs-card">
          <div class="log-tabs">
            <template x-for="area in logAreas" :key="area">
              <button class="chip" :class="{ active: activeLog === area }" @click="selectLog(area)" x-text="area"></button>
            </template>
          </div>
          <pre class="log-view" x-ref="logView"><template x-for="(line, i) in logLines" :key="i"><div class="log-line" :class="logClass(line)" x-text="line"></div></template></pre>
          <div class="empty" x-show="!logLines.length && !loading">No log entries.</div>
        </div>
      </template>

      <!-- About -->
      <template x-if="settingsActiveTab === 'about'">
        <div class="settings-grid">
          <template x-for="group in settingsGroups" :key="group.title">
            <div class="card glass">
              <div class="card-head"><h2 class="card-title" x-text="group.title"></h2></div>
              <dl class="kv">
                <template x-for="row in group.rows" :key="row.k">
                  <div class="kv-row"><dt x-text="row.k"></dt><dd x-text="row.v"></dd></div>
                </template>
              </dl>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- Organizations view -->
  <!-- ── API Keys (unified: organizations + credentials) ── -->
  <template x-if="page === 'organizations' || page === 'api-keys'">
    <div class="page" style="gap:18px">
      <!-- Onboarding: shown when no orgs exist -->
      <div x-show="!orgs.length && !loading" class="card glass" style="text-align:center;padding:32px 24px">
        <h2 style="font-size:1.2rem;font-weight:700;margin:0 0 6px">No API Keys Yet</h2>
        <p style="color:var(--text-muted);max-width:440px;margin:0 auto 20px;font-size:0.88rem">
          Add your Onshape API keys to start exporting. Create an organization to group related keys, or add them directly.
        </p>
        <button class="btn btn-primary" @click="newOrg.name = ''; document.querySelector('.org-create-card')?.scrollIntoView({behavior:'smooth'})">
          ➕ Add Your First API Key
        </button>
        <button class="btn btn-ghost btn-sm" style="margin-left:8px" @click="importAccounts()">Import from Legacy Accounts</button>
      </div>

      <!-- New organization form -->
      <div class="card glass org-create-card">
        <div class="card-head">
          <h2 class="card-title">New Organization</h2>
          <button class="btn btn-ghost btn-sm" @click="importAccounts()">Import from Accounts</button>
        </div>
        <div class="form-grid">
          <label class="field"><span>Name</span><input x-model="newOrg.name" placeholder="Engineering Team" /></label>
          <label class="field"><span>Type</span>
            <select x-model="newOrg.type">
              <template x-for="t in orgTypes" :key="t"><option x-text="t"></option></template>
            </select>
          </label>
          <label class="field" style="grid-column:1/-1"><span>Description (optional)</span>
            <input x-model="newOrg.description" placeholder="Main engineering Onshape account" /></label>
        </div>
        <button class="btn btn-primary btn-sm" style="margin-top:14px" @click="createOrg()">Create Organization</button>
      </div>

      <!-- Organization cards -->
      <template x-for="org in orgs" :key="org.id">
        <div class="card glass">
          <div class="card-head">
            <div>
              <h2 class="card-title" x-text="org.name"></h2>
              <p class="card-sub">
                <span class="badge badge-muted" x-text="org.type"></span>
                <span x-text="org.credential_count + ' key' + (org.credential_count === 1 ? '' : 's')"></span>
                <span x-show="org.description" x-text="' · ' + org.description"></span>
              </p>
            </div>
            <div class="toolbar-actions">
              <button class="btn btn-ghost btn-sm" @click="duplicateOrg(org.id)">Duplicate</button>
              <button class="btn btn-ghost btn-sm" @click="deleteOrg(org.id)">Delete</button>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Key Name</th><th>Health</th><th>Priority</th><th>Usage Today</th><th>Access Key</th><th></th></tr></thead>
              <tbody>
                <template x-for="c in org.credentials" :key="c.id">
                  <tr>
                    <td><strong x-text="c.name"></strong><br><span style="font-size:0.72rem;color:var(--text-dim)" x-text="c.environment"></span></td>
                    <td><span class="badge" :class="healthClass(c.health)" x-text="c.health"></span></td>
                    <td x-text="c.priority"></td>
                    <td x-text="c.requests_today"></td>
                    <td><code x-text="c.access_key"></code></td>
                    <td style="white-space:nowrap">
                      <button class="btn btn-ghost btn-sm" @click="testCredential(org.id, c.id)">Test</button>
                      <button class="btn btn-ghost btn-sm" @click="deleteCredential(org.id, c.id)">✕</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="empty" x-show="!org.credentials.length" style="padding:18px">No keys yet — add one below.</div>
          <details class="cred-add">
            <summary>+ Add API Key</summary>
            <div class="form-grid" style="margin-top:12px">
              <label class="field"><span>Key Name</span><input x-model="credForm.name" placeholder="Primary" /></label>
              <label class="field"><span>Environment</span><input x-model="credForm.environment" placeholder="production" /></label>
              <label class="field"><span>Access Key</span><input x-model="credForm.access_key" placeholder="env:ONSHAPE_ACCESS_KEY" /></label>
              <label class="field"><span>Secret Key</span><input type="password" x-model="credForm.secret_key" placeholder="env:ONSHAPE_SECRET_KEY" /></label>
              <label class="field"><span>Priority (1 = primary)</span><input type="number" min="1" x-model.number="credForm.priority" /></label>
            </div>
            <button class="btn btn-primary btn-sm" style="margin-top:12px" @click="addCredential(org.id)">Add Key</button>
          </details>
        </div>
      </template>
    </div>
  </template>

  <!-- System monitoring view -->
  <template x-if="page === 'system'">
    <div class="page" style="gap:18px">
      <section class="stat-grid">
        <template x-for="card in systemCards" :key="card.key">
          <div class="stat-card glass" :class="card.accent">
            <div class="stat-card-top"><span class="stat-icon" x-html="card.icon"></span>
              <span class="stat-trend" x-show="card.badge" x-text="card.badge"></span></div>
            <div class="stat-value" x-text="card.value"></div>
            <div class="stat-label" x-text="card.label"></div>
          </div>
        </template>
      </section>

      <section class="grid-2">
        <div class="card glass">
          <div class="card-head"><h2 class="card-title">Remote Access</h2>
            <span class="badge" :class="remote.recommended_url ? 'badge-ok' : 'badge-muted'"
                  x-text="remote.recommended_url ? 'Reachable' : 'Local only'"></span></div>
          <dl class="kv">
            <template x-for="row in remoteRows" :key="row.k">
              <div class="kv-row"><dt x-text="row.k"></dt>
                <dd><span class="badge" :class="row.cls" x-show="row.badge" x-text="row.badge"></span>
                  <span x-text="row.v"></span></dd></div>
            </template>
          </dl>
        </div>
        <div class="card glass">
          <div class="card-head"><h2 class="card-title">Access URLs</h2></div>
          <div class="url-list">
            <template x-for="url in remote.local_urls || []" :key="url">
              <a class="url-pill" :href="url" target="_blank" x-text="url"></a>
            </template>
            <template x-for="url in (remote.tailscale && remote.tailscale.urls) || []" :key="url">
              <a class="url-pill ts" :href="url" target="_blank" x-text="'Tailscale · ' + url"></a>
            </template>
          </div>
        </div>
      </section>

      <section class="card glass">
        <div class="card-head">
          <h2 class="card-title">Export Worker</h2>
          <span class="badge" :class="(system.worker && system.worker.running) ? 'badge-ok' : 'badge-muted'"
                x-text="(system.worker && system.worker.running) ? 'Running' : 'Stopped'"></span>
        </div>
        <dl class="kv">
          <div class="kv-row"><dt>Last tick</dt><dd x-text="system.worker && system.worker.last_tick_at ? formatTime(system.worker.last_tick_at) : '—'"></dd></div>
          <div class="kv-row"><dt>Jobs processed</dt><dd x-text="(system.worker && system.worker.jobs_processed) || 0"></dd></div>
          <div class="kv-row"><dt>Jobs failed</dt><dd x-text="(system.worker && system.worker.jobs_failed) || 0"></dd></div>
          <div class="kv-row" x-show="system.worker && system.worker.active_label"><dt>Active job</dt><dd x-text="system.worker && system.worker.active_label"></dd></div>
          <div class="kv-row" x-show="system.worker && system.worker.last_error"><dt>Last error</dt><dd x-text="system.worker && system.worker.last_error"></dd></div>
        </dl>
        <div class="toolbar-actions" style="margin-top:14px">
          <button class="btn btn-primary btn-sm" @click="workerControl('start')"
                  x-show="!(system.worker && system.worker.running)">Start Worker</button>
          <button class="btn btn-ghost btn-sm" @click="workerControl('stop')"
                  x-show="system.worker && system.worker.running">Stop Worker</button>
        </div>
      </section>

      <section class="card glass">
        <div class="card-head"><h2 class="card-title">Backups</h2>
          <button class="btn btn-primary btn-sm" @click="createBackup()" :class="{ spinning: backupBusy }">
            <span x-html="icons.refresh"></span><span>Create Backup</span></button></div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Name</th><th>Size</th><th>Files</th><th>Created</th></tr></thead>
            <tbody>
              <template x-for="b in backups" :key="b.name">
                <tr><td><code x-text="b.name"></code></td><td x-text="b.size_human"></td>
                  <td x-text="b.entry_count"></td><td x-text="formatTime(b.created_at)"></td></tr>
              </template>
            </tbody>
          </table>
        </div>
        <div class="empty" x-show="!backups.length">No backups yet. Create one to snapshot config and database.</div>
      </section>
    </div>
  </template>

  <!-- Activity / live event feed view -->
  <template x-if="page === 'activity'">
    <div class="page" style="gap:18px">
      <section class="stat-grid">
        <template x-for="card in activityCards" :key="card.key">
          <div class="stat-card glass" :class="card.accent">
            <div class="stat-card-top"><span class="stat-icon" x-html="card.icon"></span></div>
            <div class="stat-value" x-text="card.value"></div>
            <div class="stat-label" x-text="card.label"></div>
          </div>
        </template>
      </section>

      <div class="card glass">
        <div class="card-head">
          <h2 class="card-title">Live Activity</h2>
          <div class="toolbar-actions">
            <span class="live-indicator" :class="{ live: wsConnected }">
              <span class="dot"></span>
              <span x-text="wsConnected ? 'Streaming' : 'Polling'"></span>
            </span>
            <select x-model="activityCategory" @change="loadActivity()" class="chip-select">
              <option value="">All categories</option>
              <template x-for="c in activityCategories" :key="c"><option :value="c" x-text="c"></option></template>
            </select>
            <select x-model="activitySeverity" @change="loadActivity()" class="chip-select">
              <option value="">All levels</option>
              <template x-for="s in activitySeverities" :key="s"><option :value="s" x-text="s"></option></template>
            </select>
          </div>
        </div>
        <div class="event-feed">
          <template x-for="ev in events" :key="ev.id || ev.event_id">
            <div class="event-row" :class="'sev-' + ev.severity">
              <span class="event-dot" :class="'sev-' + ev.severity"></span>
              <div class="event-main">
                <div class="event-msg" x-text="ev.message || ev.type"></div>
                <div class="event-meta">
                  <span class="badge badge-muted" x-text="ev.category"></span>
                  <span class="event-type" x-text="ev.type"></span>
                  <span class="event-actor" x-text="ev.actor"></span>
                </div>
              </div>
              <span class="event-time" :title="ev.timestamp" x-text="formatTime(ev.timestamp)"></span>
            </div>
          </template>
        </div>
        <div class="empty" x-show="!events.length && !loading">No activity recorded yet.</div>
      </div>
    </div>
  </template>

  <!-- Notifications view -->
  <template x-if="page === 'notifications'">
    <div class="page" style="gap:18px">
      <div class="card glass">
        <div class="card-head">
          <h2 class="card-title">Add Notification Channel</h2>
        </div>
        <p class="card-sub">Send events to Discord, Slack, Microsoft Teams, email, or any webhook. No config files to edit.</p>
        <div class="form-grid">
          <label class="field"><span>Name</span><input x-model="notifForm.name" placeholder="Team Discord" /></label>
          <label class="field"><span>Kind</span>
            <select x-model="notifForm.kind">
              <template x-for="k in notifKinds" :key="k"><option x-text="k"></option></template>
            </select>
          </label>
          <label class="field" style="grid-column:1/-1">
            <span x-text="notifForm.kind === 'email' ? 'Recipient address(es), comma-separated' : 'Webhook URL'"></span>
            <input x-model="notifForm.target" :placeholder="notifForm.kind === 'email' ? 'alerts@example.com' : 'https://discord.com/api/webhooks/…'" />
          </label>
          <label class="field"><span>Minimum severity</span>
            <select x-model="notifForm.min_severity">
              <template x-for="s in notifSeverities" :key="s"><option x-text="s"></option></template>
            </select>
          </label>
          <label class="field"><span>Enabled</span>
            <select x-model="notifForm.enabled">
              <option :value="true">Yes</option><option :value="false">No</option>
            </select>
          </label>
        </div>
        <template x-if="notifForm.kind === 'email'">
          <div class="form-grid" style="margin-top:12px">
            <label class="field"><span>SMTP host</span><input x-model="notifForm.options.smtp_host" placeholder="smtp.gmail.com" /></label>
            <label class="field"><span>SMTP port</span><input type="number" x-model.number="notifForm.options.smtp_port" placeholder="587" /></label>
            <label class="field"><span>SMTP username</span><input x-model="notifForm.options.smtp_username" placeholder="you@example.com" /></label>
            <label class="field"><span>SMTP password</span><input type="password" x-model="notifForm.options.smtp_password" placeholder="app password" /></label>
          </div>
        </template>
        <button class="btn btn-primary btn-sm" style="margin-top:14px" @click="saveNotification()">
          <span x-text="notifForm.id ? 'Save Changes' : 'Add Channel'"></span>
        </button>
        <button class="btn btn-ghost btn-sm" style="margin-top:14px" x-show="notifForm.id" @click="resetNotifForm()">Cancel</button>
      </div>

      <div class="card glass">
        <div class="card-head"><h2 class="card-title">Channels</h2>
          <span class="badge" :class="notifEnabled ? 'badge-ok' : 'badge-muted'" x-text="notifEnabled ? 'Notifications on' : 'Notifications off'"></span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Name</th><th>Kind</th><th>Target</th><th>Min Severity</th><th>Enabled</th><th></th></tr></thead>
            <tbody>
              <template x-for="ch in notifChannels" :key="ch.id">
                <tr>
                  <td><strong x-text="ch.name"></strong></td>
                  <td><span class="badge badge-muted" x-text="ch.kind"></span></td>
                  <td><code x-text="(ch.target || '').slice(0, 48)"></code></td>
                  <td x-text="ch.min_severity"></td>
                  <td><span class="badge" :class="ch.enabled ? 'badge-ok' : 'badge-muted'" x-text="ch.enabled ? 'Yes' : 'No'"></span></td>
                  <td class="row-actions">
                    <button class="btn btn-ghost btn-sm" @click="testNotification(ch.id)">Test</button>
                    <button class="btn btn-ghost btn-sm" @click="editNotification(ch)">Edit</button>
                    <button class="btn btn-ghost btn-sm" @click="deleteNotification(ch.id)">✕</button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div class="empty" x-show="!notifChannels.length && !loading">No channels yet. Add one above to start receiving alerts.</div>
      </div>
    </div>
  </template>

  <!-- Plugins view -->
  <template x-if="page === 'plugins'">
    <div class="card glass">
      <div class="card-head"><h2 class="card-title">Plugin System</h2></div>
      <p class="card-sub">Extend exports, storage, notifications, post-processing, validators, and reports.</p>
      <div class="plugin-grid">
        <template x-for="p in pluginHooks" :key="p.name">
          <div class="plugin-card">
            <div class="plugin-icon" x-html="icons.puzzle"></div>
            <div class="plugin-name" x-text="p.name"></div>
            <div class="plugin-desc" x-text="p.desc"></div>
          </div>
        </template>
      </div>
    </div>
  </template>
</div>
{% endblock %}
